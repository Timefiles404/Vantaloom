name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            artifact: Vantaloom-windows
          - platform: macos
            os: macos-latest
            artifact: Vantaloom-macos
          - platform: linux
            os: ubuntu-22.04
            artifact: Vantaloom-linux

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Linux 桌面依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/desktop/go.mod

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 构建桌面应用
        working-directory: apps/desktop
        run: wails build -clean

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/build/bin/**

  publish:
    name: 发布到 GitHub Releases
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: 生成自更新清单
        run: |
          mkdir -p release-manifest
          cp tools/ci/update-manifest.template.json release-manifest/latest.json

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**
            release-manifest/latest.json
          generate_release_notes: true
